AVALON_STREAMING:
  busType:
    vendor: ipcraft
    library: busif
    name: avalon_st
    version: '1.0'
    description: >
      Avalon Streaming (Avalon-ST) is a bus protocol used in Altera (Intel) FPGA designs for high-speed streaming data transfers. It supports unidirectional data flow with optional sideband signals for packet management and error reporting.
  ports:
  - name: clk
    presence: required
  - name: reset
    presence: required
  - name: data
    width: 32
    direction: out
    presence: required
  - name: valid
    direction: out
    presence: required
  - name: ready
    direction: in
    presence: optional
  - name: startofpacket
    direction: out
    presence: optional
  - name: endofpacket
    direction: out
    presence: optional
  - name: empty
    width: 2
    direction: out
    presence: optional
  - name: channel
    width: 8
    direction: out
    presence: optional
  - name: error
    width: 2
    direction: out
    presence: optional
