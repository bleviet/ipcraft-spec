AVALON_MEMORY_MAPPED:
  busType:
    vendor: ipcraft
    library: busif
    name: avalon_mm
    version: '1.0'
    description: >
      Avalon Memory-Mapped (Avalon-MM) is a bus protocol used in Altera (Intel) FPGA designs for connecting masters and slaves in a memory-mapped fashion. It supports read and write operations with optional burst transfers and provides signals for flow control and error reporting.
  ports:
  - name: clk
    presence: required
  - name: reset
    presence: required
  - name: address
    width: 32
    direction: out
    presence: required
  - name: read
    direction: out
    presence: required
  - name: write
    direction: out
    presence: required
  - name: byteenable
    width: 4
    direction: out
    presence: optional
  - name: chipselect
    direction: out
    presence: optional
  - name: writedata
    width: 32
    direction: out
    presence: required
  - name: readdata
    width: 32
    direction: in
    presence: required
  - name: readdatavalid
    direction: in
    presence: optional
  - name: waitrequest
    direction: in
    presence: optional
  - name: burstcount
    width: 8
    direction: out
    presence: optional
  - name: beginbursttransfer
    direction: out
    presence: optional
  - name: response
    width: 2
    direction: in
    presence: optional
