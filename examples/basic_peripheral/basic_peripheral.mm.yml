- name: CSR_MAP
  description: Control/Status Registers
  addressBlocks:
  - name: CONTROL_STATUS_REGS
    baseAddress: 0
    usage: register
    defaultRegWidth: 32
    registers:
    - name: CONTROL
      description: Global peripheral control register
      fields:
      - name: ENABLE
        bits: '[0:0]'
        access: read-write
        description: Global enable
      - name: IRQ_ENABLE
        bits: '[3:3]'
        access: read-write
        description: Enable interrupt generation
      - name: RESERVED
        bits: '[31:4]'
        access: read-only
    - name: STATUS
      description: Peripheral status register
      access: read-only
      fields:
      - name: READY
        bits: '[0:0]'
        access: read-only
        description: Peripheral is ready
      - name: ERROR
        bits: '[1:1]'
        access: read-only
        description: Error condition detected
      - name: RESERVED
        bits: '[31:2]'
        access: read-only
    - name: DATA_OUT
      description: Direct data output control
      fields:
      - name: DATA
        bits: '[31:0]'
        access: read-write
        description: Data output state
