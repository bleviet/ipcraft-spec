vlnv:
  vendor: ipcraft

  library: examples
  name: basic_peripheral
  version: 1.0.0
description: A basic IP core with a single AXI-Lite interface and simple memory map.
parameters:
- name: PARAM_CHOICES
  value: 32
  dataType: integer
  description: Width of the primary data port
  allowedValues: [ 8, 16, 32 ]
  uiPage: Configuration
  uiGroup: Integer Parameters
- name: PARAM_RANGE
  dataType: integer
  defaultValue: 0
  min: 0
  max: 255
  uiPage: Configuration
  uiGroup: Integer Parameters
- name: PARAM_INTEGER
  dataType: integer
  defaultValue: 0
  uiPage: Configuration
- name: ENABLE
  dataType: boolean
  defaultValue: false
  uiPage: Advanced
- name: STR_CHOICES
  dataType: string
  defaultValue: "XILINX"
  allowedValues: [ ALTERA, XILINX ]
  uiPage: Advanced
  uiGroup: String Parameters
- name: STR
  dataType: string
  defaultValue: "BASIC"
  uiPage: Advanced
  uiGroup: String Parameters
clocks:
- name: clk
  logicalName: CLK
  direction: in
  frequency: 100MHz
  description: Main system clock
  associatedReset: reset_n
resets:
- name: reset_n
  logicalName: RESET_N
  direction: in
  polarity: activeLow
  description: Active-low system reset
  associatedClock: clk
ports:
- name: o_data
  logicalName: DATA_OUT
  direction: out
  width: PARAM_CHOICES
  description: Parallel data output
interrupts:
- name: o_irq
  logicalName: IRQ_OUT
  direction: out
  sensitivity: LEVEL_HIGH
  description: Interrupt request output
busInterfaces:
- name: S_AXI_LITE
  type: ipcraft.busif.axi4_lite.1.0
  mode: slave
  physicalPrefix: s_axil_
  associatedClock: clk
  associatedReset: reset_n
  memoryMapRef: CSR_MAP
  portWidthOverrides:
    AWADDR: 12
    ARADDR: 12
    WDATA: 32
    RDATA: 32
    WSTRB: 4
memoryMaps:
  import: basic_peripheral.mm.yml
fileSets:
- name: RTL_Sources
  description: RTL Sources
  files:
  - path: rtl/basic_peripheral_pkg.vhd
    type: vhdl
  - path: rtl/basic_peripheral_regs.vhd
    type: vhdl
  - path: rtl/basic_peripheral_core.vhd
    type: vhdl
    managed: false
  - path: rtl/basic_peripheral_axil.vhd
    type: vhdl
  - path: rtl/basic_peripheral.vhd
    type: vhdl
- name: Simulation_Resources
  description: Simulation Files
  files:
  - path: tb/basic_peripheral_test.py
    type: python
