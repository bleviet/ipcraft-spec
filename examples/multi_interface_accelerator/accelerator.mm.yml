- name: CSR_MAP
  description: Control/Status Registers and Local Memory
  addressBlocks:
  - name: GLOBAL_REGS
    baseAddress: 0
    usage: register
    defaultRegWidth: 32
    registers:
    - name: GLOBAL_CTRL
      description: Global control register
      fields:
      - name: ENABLE_ALL
        bits: '[0:0]'
        access: read-write
        description: Enable all processing units
      - name: MODE
        bits: '[2:1]'
        access: read-write
        description: Operating mode select
      - name: RESET_ALL
        bits: '[8:8]'
        access: write-only
        description: Software reset for all logic
      - name: RESERVED
        bits: '[31:9]'
        access: read-only
    - name: GLOBAL_STATUS
      description: Global status register
      access: read-only
      fields:
      - name: IRQ_PENDING
        bits: '[0:0]'
        access: read-only
        description: Global interrupt pending flag
      - name: RESERVED
        bits: '[31:1]'
        access: read-only
  - name: CHANNEL_CONFIG
    baseAddress: 1024
    usage: register
    defaultRegWidth: 32
    registers:
    - name: CHANNEL
      count: 4
      stride: 16
      description: Per-channel configuration and status
      registers:
      - name: CTRL
        offset: 0
        description: Channel Control Register
        fields:
        - name: ENABLE
          bits: '[0:0]'
          access: read-write
        - name: IE
          bits: '[2:2]'
          access: read-write
          description: Interrupt enable
      - name: STATUS
        offset: 4
        description: Channel Status Register
        access: write-1-to-clear
        fields:
        - name: IRQ_PENDING
          bits: '[0:0]'
          access: write-1-to-clear
      - name: PARAMETER
        offset: 8
        description: Channel-specific parameter
        access: read-write
        fields:
        - name: VALUE
          bits: '[31:0]'
          access: read-write
  - name: SENSOR_BLOCK
    baseAddress: 256
    usage: register
    defaultRegWidth: 32
    description: Sensor status block demonstrating change-of-state W1C automation
    registers:
    - name: SENSOR_STATUS
      offset: 0
      access: read-write-1-to-clear
      description: Sensor status with automatic change detection
      fields:
      - name: FIFO_OVERFLOW
        bits: '[0:0]'
        access: write-1-to-clear
        description: Sticky bit — set by external FIFO overflow pulse.
      - name: TEMP_VALUE
        bits: '[15:4]'
        access: read-only
        description: Live 12-bit ADC temperature reading.
      - name: TEMP_UPDATED
        bits: '[16:16]'
        access: write-1-to-clear
        monitorChangeOf: TEMP_VALUE
        description: Sticky bit — auto-sets when TEMP_VALUE changes. No pulse port needed.
  - name: LOCAL_RAM
    baseAddress: 4096
    usage: memory
    range: 4K
    defaultRegWidth: 32
    access: read-write
    description: 4K local scratchpad RAM
