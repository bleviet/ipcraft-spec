vlnv:
  vendor: ipcraft
  library: templates
  name: basic_core
  version: 1.0.0
description: Basic IP core with clock, reset, and simple ports
clocks:
- name: clk
  logicalName: CLK
  direction: in
  frequency: 100MHz
  description: Main system clock
resets:
- name: reset_n
  logicalName: RESET_N
  direction: in
  polarity: activeLow
  description: Main system reset, active low
ports:
- name: o_enable
  logicalName: ENABLE
  direction: out
  description: Enable output signal
