vlnv:
  vendor: ipcraft
  library: templates
  name: axi_slave_core
  version: 1.0.0
description: IP core with AXI-Lite slave interface and register map
clocks:
- name: clk
  logicalName: CLK
  direction: in
  frequency: 100MHz
  description: AXI-Lite clock
  associatedReset: reset_n
resets:
- name: reset_n
  logicalName: RESET_N
  direction: in
  polarity: activeLow
  description: AXI-Lite reset, active low
  associatedClock: clk
busInterfaces:
- name: s_axi_lite
  type: ipcraft:busif:axi4_lite:1.0
  mode: slave
  physicalPrefix: s_axil_
  associatedClock: clk
  associatedReset: reset_n
  memoryMapRef: CSR_MAP
  portWidthOverrides:
    AWADDR: 12
    ARADDR: 12
    WDATA: 32
    RDATA: 32
    WSTRB: 4
memoryMaps:
  import: axi_slave.mm.yml
